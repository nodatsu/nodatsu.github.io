  <div id="range">
    <input id="range-bar" type="range" value="1" min="1" max="34" step="1" oninput="$('#flipbook').turn('page', this.value)" class="custom"  onchange="changeValue(this.value)" >
    <span id="val">1</span>
  </div>

  <script type="text/javascript">
    $('#flipbook').turn({
      // width:950,
      // height:1280,
      acceleration: true, // for touch devices this value must be true
      // autoCenter: true,
      display: "single",  // 単ページ("single") or 見開き("double")
      duration: 1200, // アニメーション速度
      when: {
        turned: function(event, page, pageObj) {
          console.log("the current page is " + page);
          gtag('config', 'UA-122072726-1', {
              'page_path': '/ajigasawa/' + page
          });
           document.getElementById("val").innerHTML = page;
           document.getElementById("range-bar").value = page;
           document.getElementById("range-bar").onchange();

        }
      }
    });
  </script>

  <script type="text/javascript">
    var Sample = {
      wait : 10000, //待機時間（秒)
      url : "http://aziocean.html.xdomain.jp/ajigasawa/ajigasawa.html" //ジャンプ先URL
    };

    Sample.record = function() {
      this.timeout = +new Date() + this.wait * 1000;
    };

    Sample.check = function() {
      if (this.timeout == undefined) this.record();
      if (this.timeout - new Date() < 0) location.href = this.url;
    }

    //@cc_on
    document.addEventListener('touchmove', function(){
      Sample.record()
    }, false);
    setInterval(function(){
      Sample.check()
    }, 500);
  </script>
