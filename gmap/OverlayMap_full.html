<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html lang="ja">
<head>
<title>Google マップ - OverlayMap</title>
<meta http-equiv="Content-Type" content="text/html;charset=utf-8">
<meta http-equiv="Content-Script-Type" content="text/javascript">
<meta http-equiv="Content-Style-Type" content="text/css">
<meta name="author" content="H.Kuma" />
<meta name="description" content="Googlemap" />
<link rel="stylesheet" type="text/css" href="./MTileLayer.css">
<style type="text/css">
body {
	margin: 0;
	padding: 0;
}
#maparea {
	margin: auto;
	width: 100%;
	height: 100%;
	color: #000;
	background-color: #ddd;
}
#wrap {
	position: relative;
	width: 100%;
	height: 100%;
	border-bottom: solid 1px;
}
</style>
<script type="text/javascript" src="http://maps.google.com/maps/api/js?sensor=false"></script>
<script type="text/javascript" src="./js/MCustomTileLayer.js"></script>
<script type="text/javascript" src="./js/MTileLayerControl_v3.js"></script>
<script type="text/javascript" src="./js/prototype.js"></script> 
<script type="text/javascript" src="./js/scriptaculous.js"></script><!-- needs slider.js -->
<script type="text/javascript" src="./js/OverlayMap.js"></script>
<script type="text/javascript">
// Googlemap API
var maptype  = 'satellite';			// roadmap, satellite, hybrid, terrain
var imgfoldr = 'image';				// マップイメージフォルダ
var maptheme = new Array('theme1', 'theme2');	// レイヤーするマップのサブフォルダ
var maptitle = new Array('title1', 'title2');	// レイヤーするマップのタイトル
var mapvalue = new Array('50', '30');		// レイヤーするマップの表示率
var mapnoimg = 'blank.gif';			// タイル無しの時の表示
var zoomsize = 16;				// 初期ズームレベル
var mapcentr = new Array(40.817216, 140.745069);	// 初期座標
var debugmap = 1;	// デバッグモード（タイル座標表示＋毎表示毎にタイルキャッシュクリア：公開時は0）
var fullflag = 1;	// 全画面表示
window.onload=function(){ gmapload(); }		// マップロード
</script>
</head>
<body>

<div id="maparea" class="clearfix">
  <div id="wrap">
    <div id="mapd"></div>
    <div id="pano"></div>
    <div id="zoom"></div>
  </div><!-- end wrap -->
  <div id="controlsDiv" style="float:left; margin-right: 1em;"></div>
  <div style="margin: 10px 10px 0 0; font-size: 8pt; float: right;"><small>（地図の説明書き / 引用元 etc.）</small></div>
</div><!-- end maparea -->

</body>
</html>
